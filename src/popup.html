<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VeilRoute Proxy</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">

    <!-- Header -->
    <header class="topbar">
      <div class="brand">
        <div class="brand-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        <div class="brand-text">
          <span class="brand-eyebrow">Browser Proxy</span>
          <span class="brand-name">VeilRoute</span>
        </div>
      </div>
      <button class="icon-btn" id="settingsButton" title="Settings" aria-label="Open settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </header>

    <!-- Status orb -->
    <section class="status-panel" aria-live="polite">
      <div class="orb-wrap">
        <div class="orb" id="connectionRing">
          <span class="orb-flag" id="regionFlag">&#127482;&#127480;</span>
        </div>
        <div class="orb-ring-outer" id="orbRingOuter"></div>
      </div>
      <p class="status-label" id="statusLabel">Disconnected</p>
      <div class="status-meta">
        <span class="meta-chip ip-chip" id="ipLabel">IP not checked</span>
        <span class="meta-chip latency-chip" id="latencyChip">— ms</span>
      </div>
      <strong class="region-name" id="regionLabel">New York, United States</strong>
      <span class="warning-label" id="warningLabel"></span>
    </section>

    <!-- Power button -->
    <button class="power-btn" id="powerButton" type="button">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>
      <span id="powerText">Connect</span>
    </button>

    <!-- Quick actions -->
    <div class="quick-actions">
      <button class="qa-btn" id="fastestButton" type="button">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        Fastest
      </button>
      <button class="qa-btn" id="checkIpButton" type="button">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        Check IP
      </button>
    </div>

    <!-- Regions -->
    <section class="regions" aria-label="Available regions">
      <div class="section-head">
        <h2>Locations</h2>
        <span class="region-count" id="regionCount">0 ready</span>
      </div>
      <div class="region-list" id="regionList"></div>
    </section>

    <!-- WebRTC toggle -->
    <div class="webrtc-row">
      <div class="webrtc-info">
        <span class="webrtc-label">Block WebRTC Leaks</span>
        <span class="webrtc-sub">Prevents IP exposure via WebRTC</span>
      </div>
      <label class="toggle" aria-label="Block WebRTC">
        <input type="checkbox" id="webrtcToggle" checked>
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
      </label>
    </div>

    <!-- Footer -->
    <footer class="shell-footer">
      <span>VeilRoute v1.1.0</span>
      <span class="footer-dot"></span>
      <span>MIT License</span>
    </footer>

  </main>
  <script type="module" src="popup.js"></script>
</body>
</html>
